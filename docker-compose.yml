services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: domain-monitor-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    networks:
      - domain-monitor-network
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: domain-monitor-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - domain-monitor-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: domain-monitor-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: domain_monitor
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: domain_user
      MYSQL_PASSWORD: domain_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - domain-monitor-network

  redis:
    image: redis:alpine
    container_name: domain-monitor-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - domain-monitor-network

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: domain-monitor-queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --tries=3 --timeout=90
    volumes:
      - ./src:/var/www
    networks:
      - domain-monitor-network
    depends_on:
      - db
      - redis

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: domain-monitor-scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan schedule:work
    volumes:
      - ./src:/var/www
    networks:
      - domain-monitor-network
    depends_on:
      - db
      - redis

networks:
  domain-monitor-network:
    driver: bridge

volumes:
  db_data:
